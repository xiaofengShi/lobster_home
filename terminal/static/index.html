<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>🦞 龙虾管家</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            color: #fff;
            overflow: hidden;
        }
        
        .container {
            display: flex;
            flex-direction: column;
            height: 100vh;
            padding: 20px;
            padding-top: env(safe-area-inset-top, 20px);
            padding-bottom: env(safe-area-inset-bottom, 20px);
        }
        
        /* Header */
        .header {
            text-align: center;
            padding: 10px 0;
        }
        
        .lobster-emoji {
            font-size: 64px;
            animation: bounce 2s infinite;
        }
        
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        
        .status {
            font-size: 14px;
            color: #4ade80;
            margin-top: 5px;
        }
        
        .status.offline { color: #ef4444; }
        .status.listening { color: #fbbf24; }
        .status.thinking { color: #60a5fa; }
        .status.speaking { color: #a78bfa; }
        
        /* Chat Area */
        .chat-area {
            flex: 1;
            overflow-y: auto;
            padding: 15px 0;
            -webkit-overflow-scrolling: touch;
        }
        
        .message {
            max-width: 85%;
            margin: 10px 0;
            padding: 12px 16px;
            border-radius: 18px;
            animation: fadeIn 0.3s ease;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .message.user {
            background: #3b82f6;
            margin-left: auto;
            border-bottom-right-radius: 4px;
        }
        
        .message.assistant {
            background: rgba(255,255,255,0.1);
            margin-right: auto;
            border-bottom-left-radius: 4px;
        }
        
        .message .time {
            font-size: 11px;
            opacity: 0.6;
            margin-top: 5px;
        }
        
        /* Controls */
        .controls {
            padding: 15px 0;
        }
        
        .mic-btn {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            border: none;
            background: linear-gradient(145deg, #e74c3c, #c0392b);
            color: white;
            font-size: 32px;
            cursor: pointer;
            margin: 0 auto;
            display: block;
            box-shadow: 0 8px 25px rgba(231, 76, 60, 0.4);
            transition: all 0.2s;
            -webkit-tap-highlight-color: transparent;
        }
        
        .mic-btn:active, .mic-btn.recording {
            transform: scale(1.1);
            background: linear-gradient(145deg, #27ae60, #2ecc71);
            box-shadow: 0 8px 30px rgba(46, 204, 113, 0.5);
        }
        
        .mic-btn.disabled {
            background: #666;
            box-shadow: none;
        }
        
        .hint {
            text-align: center;
            font-size: 13px;
            color: rgba(255,255,255,0.5);
            margin-top: 10px;
        }
        
        /* Text Input (fallback) */
        .text-input-row {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }
        
        .text-input-row input {
            flex: 1;
            padding: 12px 16px;
            border-radius: 25px;
            border: 1px solid rgba(255,255,255,0.2);
            background: rgba(255,255,255,0.1);
            color: #fff;
            font-size: 16px;
            outline: none;
        }
        
        .text-input-row button {
            padding: 12px 20px;
            border-radius: 25px;
            border: none;
            background: #3b82f6;
            color: #fff;
            font-size: 16px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="lobster-emoji" id="lobster">🦞</div>
            <div class="status" id="status">连接中...</div>
        </div>
        
        <div class="chat-area" id="chatArea">
            <div class="message assistant">
                <div>你好！我是龙虾管家 Alan 🦞<br>按住下面的按钮跟我说话吧～</div>
                <div class="time">刚刚</div>
            </div>
        </div>
        
        <div class="controls">
            <button class="mic-btn" id="micBtn">🎤</button>
            <div class="hint" id="hint">按住说话，松开发送</div>
            
            <div class="text-input-row">
                <input type="text" id="textInput" placeholder="或者打字输入..." />
                <button id="sendBtn">发送</button>
            </div>
        </div>
    </div>
    
    <script>
        const lobster = document.getElementById('lobster');
        const status = document.getElementById('status');
        const chatArea = document.getElementById('chatArea');
        const micBtn = document.getElementById('micBtn');
        const hint = document.getElementById('hint');
        const textInput = document.getElementById('textInput');
        const sendBtn = document.getElementById('sendBtn');
        
        let mediaRecorder = null;
        let audioChunks = [];
        let isRecording = false;
        let audioContext = null;
        
        // Check server status
        async function checkStatus() {
            try {
                const resp = await fetch('/api/status', { method: 'POST' });
                const data = await resp.json();
                status.textContent = '🟢 在线';
                status.className = 'status';
            } catch (e) {
                status.textContent = '🔴 离线';
                status.className = 'status offline';
            }
        }
        
        // Add message to chat
        function addMessage(text, isUser = false) {
            const div = document.createElement('div');
            div.className = `message ${isUser ? 'user' : 'assistant'}`;
            div.innerHTML = `
                <div>${text}</div>
                <div class="time">${new Date().toLocaleTimeString('zh-CN', {hour: '2-digit', minute: '2-digit'})}</div>
            `;
            chatArea.appendChild(div);
            chatArea.scrollTop = chatArea.scrollHeight;
        }
        
        // Send text to chat API
        async function sendChat(text) {
            addMessage(text, true);
            status.textContent = '🤔 思考中...';
            status.className = 'status thinking';
            lobster.style.animation = 'none';
            lobster.textContent = '🦞';
            
            try {
                const resp = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ text })
                });
                const data = await resp.json();
                
                if (data.reply) {
                    addMessage(data.reply);
                    // Play TTS
                    playTTS(data.reply);
                } else if (data.error) {
                    addMessage('❌ ' + data.error);
                }
            } catch (e) {
                addMessage('❌ 网络错误: ' + e.message);
            }
            
            status.textContent = '🟢 在线';
            status.className = 'status';
            lobster.style.animation = 'bounce 2s infinite';
        }
        
        // Play TTS audio
        async function playTTS(text) {
            status.textContent = '🗣️ 说话中...';
            status.className = 'status speaking';
            
            try {
                const resp = await fetch('/api/tts', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ text })
                });
                
                if (resp.ok) {
                    const blob = await resp.blob();
                    const url = URL.createObjectURL(blob);
                    const audio = new Audio(url);
                    audio.play();
                    audio.onended = () => {
                        status.textContent = '🟢 在线';
                        status.className = 'status';
                        URL.revokeObjectURL(url);
                    };
                }
            } catch (e) {
                console.error('TTS error:', e);
            }
            
            status.textContent = '🟢 在线';
            status.className = 'status';
        }
        
        // Speech-to-text
        async function sendAudio(audioBlob) {
            status.textContent = '🎧 识别中...';
            status.className = 'status listening';
            
            try {
                const resp = await fetch('/api/stt', {
                    method: 'POST',
                    body: audioBlob
                });
                const data = await resp.json();
                
                if (data.text && data.text.trim()) {
                    sendChat(data.text);
                } else {
                    hint.textContent = '没有听清，请再说一次';
                    setTimeout(() => { hint.textContent = '按住说话，松开发送'; }, 2000);
                }
            } catch (e) {
                hint.textContent = '语音识别失败';
                setTimeout(() => { hint.textContent = '按住说话，松开发送'; }, 2000);
            }
            
            status.textContent = '🟢 在线';
            status.className = 'status';
        }
        
        // Start recording
        async function startRecording() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                mediaRecorder = new MediaRecorder(stream, { mimeType: 'audio/webm' });
                audioChunks = [];
                
                mediaRecorder.ondataavailable = (e) => {
                    audioChunks.push(e.data);
                };
                
                mediaRecorder.onstop = () => {
                    const audioBlob = new Blob(audioChunks, { type: 'audio/webm' });
                    sendAudio(audioBlob);
                    stream.getTracks().forEach(t => t.stop());
                };
                
                mediaRecorder.start();
                isRecording = true;
                micBtn.classList.add('recording');
                hint.textContent = '🔴 正在录音...';
                status.textContent = '🎤 录音中...';
                status.className = 'status listening';
                
            } catch (e) {
                alert('无法访问麦克风: ' + e.message);
            }
        }
        
        // Stop recording
        function stopRecording() {
            if (mediaRecorder && isRecording) {
                mediaRecorder.stop();
                isRecording = false;
                micBtn.classList.remove('recording');
                hint.textContent = '按住说话，松开发送';
            }
        }
        
        // Event listeners
        micBtn.addEventListener('touchstart', (e) => {
            e.preventDefault();
            startRecording();
        });
        
        micBtn.addEventListener('touchend', (e) => {
            e.preventDefault();
            stopRecording();
        });
        
        micBtn.addEventListener('mousedown', startRecording);
        micBtn.addEventListener('mouseup', stopRecording);
        micBtn.addEventListener('mouseleave', stopRecording);
        
        sendBtn.addEventListener('click', () => {
            const text = textInput.value.trim();
            if (text) {
                sendChat(text);
                textInput.value = '';
            }
        });
        
        textInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                const text = textInput.value.trim();
                if (text) {
                    sendChat(text);
                    textInput.value = '';
                }
            }
        });
        
        // Init
        checkStatus();
        setInterval(checkStatus, 30000);
    </script>
</body>
</html>
